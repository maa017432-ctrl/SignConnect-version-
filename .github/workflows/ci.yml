name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # System libraries required by OpenCV (headless) and MediaPipe.
      # These mirror the apt packages installed in the Dockerfile's builder stage.
      - name: Install OS dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            libgomp1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Cache pip's download cache so repeated runs don't re-download wheels.
      # The cache key includes the requirements files so it is invalidated
      # automatically whenever dependencies change.
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py${{ matrix.python-version }}-

      # In CI we use opencv-python-headless — identical C extensions to
      # opencv-python but without Qt/X11 GUI bindings (~60 MB smaller and
      # avoids "cannot connect to X server" errors in headless runners).
      # The sed substitution mirrors the one used in the Dockerfile so the
      # version constraint (>=4.9.0) is preserved.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          sed '/^opencv-python-headless/!s/^opencv-python/opencv-python-headless/' requirements.txt \
            | pip install --no-cache-dir -r /dev/stdin
          pip install --no-cache-dir -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Run after tests pass so we don't waste time building a broken image
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Docker Buildx for a consistent build environment.
      # The build is not pushed anywhere — this is purely a validation step
      # to confirm the Dockerfile remains syntactically and functionally valid.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (dry-run, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: signconnect:ci

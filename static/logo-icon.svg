<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .icon-node { fill: currentColor; }
      .icon-bridge { stroke: currentColor; fill: none; stroke-linecap: round; }
    </style>
  </defs>
  
  <!-- Background circle for app icon context -->
  <!-- <circle cx="32" cy="32" r="32" fill="#2997FF" opacity="0.1"/> -->
  
  <!-- Left node -->
  <circle class="icon-node" cx="20" cy="32" r="7" opacity="0.95"/>
  
  <!-- Right node -->
  <circle class="icon-node" cx="44" cy="32" r="7" opacity="0.95"/>
  
  <!-- Connection bridge -->
  <line class="icon-bridge" x1="27" y1="32" x2="37" y2="32" stroke-width="3.5"/>
  
  <!-- Signal arc - represents the flow of connection -->
  <path class="icon-bridge" d="M 22 22 Q 32 14 42 22" stroke-width="2" opacity="0.7"/>
  
  <!-- Second signal arc for emphasis -->
  <path class="icon-bridge" d="M 20 18 Q 32 8 44 18" stroke-width="1.5" opacity="0.4"/>
</svg>
